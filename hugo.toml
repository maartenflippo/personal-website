baseURL = "https://maartenflippo.com/"
locale = "en-us"
title = "Maarten Flippo"
theme = "archie"
copyright = "Maarten Flippo"

# -----------------------------------------------
# Theme parameters
# -----------------------------------------------
[params]
# Path to your profile photo (place the image in static/img/)
profilePicture = "/img/me.jpg"
profilePictureAlt = "Maarten Flippo"
# Your name as it appears in publication author lists — will be rendered in bold
authorName = "Maarten Flippo"
# Custom CSS loaded on every page
customCSS = ["css/homepage.css"]

# -----------------------------------------------
# Footer
# -----------------------------------------------
[[params.social]]
name = "GitHub"
icon = "github"
url = "https://github.com/maartenflippo"

[[params.social]]
name = "LinkedIn"
icon = "linkedin"
url = "https://linkedin.com/maartenflippo/"

[caches.images]
dir = ":cacheDir/images"
